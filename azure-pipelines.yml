
trigger:
- main

pr:
  branches:
    include:
    - main

jobs:
- job: Reboot
  pool:
    name: nitsm-python-test
  steps:
  - checkout: none
  - task: PowerShell@2
    displayName: 'Reboot agent machine'
    inputs:
      targetType: inline
      script: |
        Write-Host "Rebooting to recover NI driver state..."
        shutdown /r /t 10 /f /c "Azure DevOps pipeline-triggered reboot"